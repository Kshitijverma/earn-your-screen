name: Build TypedPond

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Windows: build + test + publish + create installer
  # ─────────────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore TypedPond.sln

      - name: Build solution
        run: dotnet build TypedPond.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test TypedPond.sln -c Release --no-build --verbosity normal

      - name: Publish Service
        run: dotnet publish src\TypedPond.Service -c Release --no-build

      - name: Publish LockScreen
        run: dotnet publish src\TypedPond.LockScreen -c Release --no-build

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TypedPondSetup-windows
          path: windows-app/installer/Output/TypedPondSetup.exe

  # ─────────────────────────────────────────────────────────────────────────
  # Android: build debug + release APK
  # ─────────────────────────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create placeholder google-services.json
        run: |
          cat > app/google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "typedpond-placeholder",
              "storage_bucket": "typedpond-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.typedpond.companion"
                  }
                },
                "api_key": [
                  { "current_key": "placeholder-api-key" }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSEOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          ORG_GRADLE_PROJECT_typedpondHmacSecret: ${{ secrets.HMAC_SECRET || 'CHANGE-THIS-SECRET' }}

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          ORG_GRADLE_PROJECT_typedpondHmacSecret: ${{ secrets.HMAC_SECRET || 'CHANGE-THIS-SECRET' }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TypedPondCompanion-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: TypedPondCompanion-release
          path: android-app/app/build/outputs/apk/release/app-release.apk
